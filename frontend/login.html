<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — MarketHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-background">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>
<nav class="navbar navbar-expand-lg navbar-white bg-white navbar-shadow sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4" href="index.html">MarketHub</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul id="mainNavLinks" class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center"></ul>
    </div>
  </div>
</nav>
<div class="container auth-wrapper d-flex justify-content-center align-items-center">
  <div class="auth-decor">
    <div class="auth-decor-bubble auth-decor-bubble-1"></div>
    <div class="auth-decor-bubble auth-decor-bubble-2"></div>
    <div class="auth-decor-ring auth-decor-ring-1"></div>
    <div class="auth-decor-ring auth-decor-ring-2"></div>
  </div>
  <div class="auth-card p-4 p-sm-5 shadow-lg">
    <div class="text-center mb-4">
      <h2 class="auth-title mb-2">Welcome Back</h2>
      <p class="auth-subtitle mb-0">Login quickly to access services, request work, and manage your account.</p>
    </div>
    <div id="loginMessage"></div>
    <form id="loginForm" class="auth-form">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control form-control-lg" id="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control form-control-lg" id="password" required>
      </div>
      <div class="d-grid mt-3">
        <button class="btn btn-primary btn-lg">Login</button>
      </div>
    </form>
    <p class="text-center text-muted mt-4 mb-0">No account? <a href="register.html">Create one</a></p>
  </div>
</div>
<div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="js/session.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
